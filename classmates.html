<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Seatwork 2</title>
</head>
<body>

    <nav class="navbar">
        <a class="brand" href="index.html">ICT10 <span>Sapphire</span></a>
        <div class="nav-links">
            <a class="nav-link active" href="index.html">Home</a>
            <a class="nav-link" href="classmates.html">Classmates</a>
            <a class="nav-link" href="attendance.html">Attendance</a>
            <a class="nav-link" href="photos.html">Photos</a>
        </div>
    </nav>

    <div class="page">

        <div class="page-heading">
            <h2>Classmate List</h2>
            <span>Section Sapphire</span>
        </div>
        
        <div class="stats-row" style="grid-template-columns: repeat(3,1fr)">
            <div class="stat-box">
                <span class="stat-val" id="stat-total">5</span>
                <span class="stat-lbl">Total Classmates</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="stat-added">0</span>
                <span class="stat-lbl">Newly Added</span>
            </div>
            <div class="stat-box">
                <span class="stat-val">ICT</span>
                <span class="stat-lbl">Subject Track</span>
            </div>
        </div>

        <div class="form-card">
            <p class="form-label">Add a Classmate</p>
            <input type="text" id="name" placeholder="Full name">
            <input type="text" id="section" placeholder="Section">
            <input type="text" id="favorite_subject" placeholder="Favorite subject">
            <div style="display:flex;gap:10px">
                <input type="button" class="btn-primary" py-click="add_classmate" value="Add Classmate">
                <input type="button" class="btn-secondary" py-click="show_list" value="Show List">
            </div>
            <div id="status-msg" class="status"></div>
        </div>

        <div class="table-wrap">
            <div class="table-header">All Classmates</div>
            <div id="output">

                <div class="empty-state">Click "Show List" to display classmates</div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <p class="progress-label" id="progress-label">0 classmates added</p>
        </div>

    </div>

    <footer class="footer">
        <div class="footer-left">Made with love by <span>Uy, Jennifer & Rivera, Benigno</span></div>
        <div class="footer-right">ICT10 · 2025–2026</div>
    </footer>

    <py-script src="classmates.py"></py-script>

</body>
</html>
